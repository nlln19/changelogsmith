# GitHub App Manifest for ChangelogSmith.
# Used when initially configuring the GitHub App with Probot.
#
# Important:
# Changing this file does not update an already-created GitHub App.
# Existing settings must be changed manually on GitHub.

default_events:
  - pull_request

default_permissions:
  # Required by GitHub Apps.
  metadata: read

  # Required to receive and read pull request data.
  pull_requests: read

  # Required for reading .github/changelogsmith.yml via context.config().
  contents: read

  # Only needed if commentOnMergedPullRequest is enabled.
  # Allows ChangelogSmith to comment on pull requests.
  issues: write

name: ChangelogSmith

description: Automated changelogs and release drafts for GitHub repositories.

url: https://github.com/nlln19/changelogsmith

public: false